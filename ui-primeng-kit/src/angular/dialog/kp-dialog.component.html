<p-dialog
  class="up-kp-dialog"
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [header]="header()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [blockScroll]="true"
  [closeOnEscape]="true"
  [dismissableMask]="false"
  [focusOnShow]="false"
  [style]="dialogStyle()"
  [attr.aria-label]="dialogAriaLabel() || null"
  (onHide)="onHide()"
  (onShow)="onShow()"
>
  <ng-content />
  <ng-template pTemplate="footer">
    <ng-content select="[upKpDialogFooter]" />
  </ng-template>
</p-dialog>
