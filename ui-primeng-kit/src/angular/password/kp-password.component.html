<div class="up-kp-password">
  @if (label(); as lbl) {
    <label class="up-kp-password__label" [attr.for]="name()">
      {{ lbl }}
      @if (required()) { <span class="up-kp-password__required">*</span> }
    </label>
  }
  <p-password
    [inputId]="name()"
    [ngModel]="value()"
    (ngModelChange)="value.set($event)"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [toggleMask]="toggleMask()"
    [feedback]="feedback()"
    weakLabel="Слабый"
    mediumLabel="Средний"
    strongLabel="Надёжный"
    promptLabel="Введите пароль"
    class="w-full"
    [inputStyleClass]="error() ? 'up-kp-password__control--error' : ''"
    size="small"
    [attr.aria-label]="inputAriaLabel() || null"
    [attr.aria-invalid]="error() ? true : null"
    [attr.aria-describedby]="error() ? errorId() : null"
  />
  @if (error()) {
    <span [id]="errorId()" class="up-kp-password__error" role="alert">{{ error() }}</span>
  }
</div>
