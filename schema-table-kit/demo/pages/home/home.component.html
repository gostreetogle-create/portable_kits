<div class="home">
  <header class="home__header">
    <h1>Portable Kits</h1>
    <p>Набор переносимых Angular-модулей для быстрой интеграции в проекты.</p>
  </header>

  <section class="home__modules">
    <h2>Модули</h2>
    <div class="home__grid">
      @for (mod of modules; track mod.id) {
        <a
          class="home__card"
          [class.home__card--active]="mod.hasDemo"
          [class.home__card--in-dev]="!mod.hasDemo"
          [routerLink]="mod.route"
        >
          <span class="home__card-title">{{ mod.title }}</span>
          <span class="home__card-subtitle">{{ mod.subtitle }}</span>
          <span class="home__card-desc">{{ mod.description }}</span>
          @if (mod.hasDemo) {
            <span class="home__card-action">Открыть →</span>
          } @else {
            <span class="home__card-badge">В разработке</span>
          }
        </a>
      }
    </div>
  </section>
</div>
