@if (module) {
  <div class="placeholder">
    <header class="placeholder__header">
      <a class="placeholder__back" routerLink="/">← На главную</a>
      <h1>{{ module.title }}</h1>
      <p class="placeholder__subtitle">{{ module.subtitle }}</p>
      <p class="placeholder__desc">{{ module.description }}</p>
    </header>

    <div class="placeholder__banner" role="status">
      <strong>Модуль в разработке</strong>
      <p>
        Код этого kit ещё не реализован. Здесь появится интерактивное demo, когда модуль будет готов.
      </p>
    </div>
  </div>
}
