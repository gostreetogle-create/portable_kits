<section class="demo-page">
  <a routerLink="/" class="demo-back">← Все модули</a>
  <h1>entity-picker-kit</h1>
  <p class="demo-lead">v0.2: single + multi-select modes.</p>

  <div class="demo-actions">
    <button type="button" class="demo-btn" (click)="openSingle()">Одиночный выбор</button>
    <button type="button" class="demo-btn" (click)="openMulti()">Множественный выбор</button>
  </div>

  @if (selected(); as row) {
    <h3>Одиночный выбор</h3>
    <pre class="demo-json">{{ row | json }}</pre>
  }

  @if (selectedMany().length > 0) {
    <h3>Множественный выбор ({{ selectedMany().length }})</h3>
    <pre class="demo-json">{{ selectedMany() | json }}</pre>
  }

  <ep-entity-picker
    entityKey="products"
    [(visible)]="singleVisible"
    (selected)="onSelected($event)"
  />

  <ep-entity-picker
    entityKey="products"
    selectionMode="multiple"
    [(visible)]="multiVisible"
    (selectedMany)="onSelectedMany($event)"
  />
</section>
