<section class="ui-kit-page">
  <nav class="ui-kit-breadcrumb">
    <a routerLink="/">Все модули</a>
    <span>/</span>
    <a routerLink="/modules/ui-primeng-kit">UI-кит</a>
    <span>/</span>
    <span>Кнопка</span>
  </nav>

  <h1>Кнопка</h1>
  <p class="ui-kit-lead"><code>up-kp-button</code> · KpButtonComponent</p>

  <section class="ui-kit-section">
    <h2>Severity</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Основная" (buttonClick)="onPrimaryClick()" />
      <up-kp-button label="Вторичная" severity="secondary" />
      <up-kp-button label="Опасная" severity="danger" />
    </div>
    <p class="ui-kit-hint">Кликов по Primary: {{ clickCount() }}</p>
  </section>

  <section class="ui-kit-section">
    <h2>Variant</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Premium (по умолч.)" />
      <up-kp-button label="Плоская" variant="flat" />
      <up-kp-button label="Плоская вторичная" variant="flat" severity="secondary" />
    </div>
  </section>

  <section class="ui-kit-section">
    <h2>Style modifiers</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Контурная" [outlined]="true" />
      <up-kp-button label="Приподнятая" [raised]="true" />
      <up-kp-button label="Текстовая" [text]="true" />
      <up-kp-button label="Отключена" [disabled]="true" />
    </div>
  </section>

  <section class="ui-kit-section">
    <h2>Size</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Малая (по умолч.)" size="small" />
      <up-kp-button label="Крупная" size="large" />
    </div>
  </section>

  <section class="ui-kit-section">
    <h2>Icon</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Сохранить" icon="pi pi-check" />
      <up-kp-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" tooltip="Удалить" />
      <up-kp-button label="Далее" icon="pi pi-arrow-right" iconPos="right" />
    </div>
  </section>

  <section class="ui-kit-section">
    <h2>Loading &amp; badge</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Загрузка" [loading]="loading()" (buttonClick)="simulateLoading()" />
      <up-kp-button label="Входящие" icon="pi pi-inbox" badge="3" />
    </div>
  </section>
</section>
