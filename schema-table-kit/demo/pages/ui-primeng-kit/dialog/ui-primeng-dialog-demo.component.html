<section class="ui-kit-page">
  <nav class="ui-kit-breadcrumb">
    <a routerLink="/">Все модули</a>
    <span>/</span>
    <a routerLink="/modules/ui-primeng-kit">UI-кит</a>
    <span>/</span>
    <span>Диалог</span>
  </nav>

  <h1>Диалог</h1>
  <p class="ui-kit-lead"><code>up-kp-dialog</code> · KpDialogComponent</p>

  <section class="ui-kit-section">
    <h2>Standard modal</h2>
    <div class="ui-kit-row">
      <up-kp-button label="Открыть диалог" (buttonClick)="dialogVisible.set(true)" />
      <up-kp-button label="Широкий (640px)" severity="secondary" (buttonClick)="wideDialogVisible.set(true)" />
    </div>

    <up-kp-dialog header="Пример диалога" [(visible)]="dialogVisible" width="420px">
      <p>PrimeNG dialog с автофокусом на первом поле.</p>
      <up-kp-input label="Email" name="demo-dialog-email" placeholder="user@example.com" [autofocus]="true" />
      <div upKpDialogFooter class="ui-kit-dialog-footer">
        <up-kp-button label="Отмена" severity="secondary" [text]="true" (buttonClick)="dialogVisible.set(false)" />
        <up-kp-button label="Сохранить" (buttonClick)="dialogVisible.set(false)" />
      </div>
    </up-kp-dialog>

    <up-kp-dialog header="Широкий диалог" [(visible)]="wideDialogVisible" width="640px">
      <p>Настраиваемая ширина через input <code>width</code>.</p>
      <div upKpDialogFooter class="ui-kit-dialog-footer">
        <up-kp-button label="Закрыть" (buttonClick)="wideDialogVisible.set(false)" />
      </div>
    </up-kp-dialog>
  </section>
</section>
